services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      APP_ADDR: :8080
      MYSQL_DSN: stockflow:stockflow@tcp(mysql:3306)/stockflow?charset=utf8mb4&parseTime=True&loc=Local
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:-local-only-change-me}
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:4310,http://127.0.0.1:4310,http://localhost:4330,http://127.0.0.1:4330}"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: stockflow
      MYSQL_USER: stockflow
      MYSQL_PASSWORD: stockflow
      MYSQL_ROOT_PASSWORD: root-local-only
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot-local-only"]
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
volumes:
  mysql-data:
  redis-data:
